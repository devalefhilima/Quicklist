<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css">
  
  <title>Quicklist</title>
</head>
<body>
  <div class="container">
    <img class="logo" src="./assets/logo.png" alt="Logo Quicklist">
    
    <div class="header-page">
      <a class="back-button" href="">
        <img src="./assets/arrow-left.svg" alt="Voltar">
        Voltar
      </a>
      <h1>Compras da semana</h1>
    </div>

    <main>
      <form>
        <div class="header-form">
          <input id="item-input" type="text" placeholder="Adicionar um novo item.">
          <button type="submit">Adicionar item</button>
        </div>

        <ul class="list">
          <li class="list-item">
            <div class="item-content">
              <input type="checkbox" id="item-1">
              <label for="item-1">Pão de forma</label>
            </div>

            <button class="delete-button" id="delete-button" type="button" aria-label="Remover item">
              <img src="./assets/Frame-3.svg" alt="Remover item">
            </button>
          </li>

          <li class="list-item">
            <div class="item-content">
              <input type="checkbox" id="item-2">
              <label for="item-2">Café preto</label>
            </div>

            <button class="delete-button" type="button" aria-label="Remover item">
              <img src="./assets/Frame-3.svg" alt="Remover item">
            </button>
          </li>

          <li class="list-item">
            <div class="item-content">
              <input type="checkbox" id="item-3">
              <label for="item-3">Suco de laranja</label>
            </div>

            <button class="delete-button" type="button" aria-label="Remover item">
              <img src="./assets/Frame-3.svg" alt="Remover item">
            </button>
          </li>

          <li class="list-item">
            <div class="item-content">
              <input type="checkbox" id="item-4">
              <label for="item-4">Bolacha</label>
            </div>

            <button class="delete-button" type="button" aria-label="Remover item">
              <img src="./assets/Frame-3.svg" alt="Remover item">
            </button>
          </li>
        </ul>

        
      </form>

      <div class="alert">
        <img src="./assets/warning-circle-filled.svg" alt="Alerta">
        <div>
          <p>O item foi removido da lista</p>

          <button class="btn">
            <img src="./assets/delete-small.svg" alt="">
          </button>
        </div>
      </div>

    </main>
  </div>

  <script src="./script.js"></script>
</body>
</html>
